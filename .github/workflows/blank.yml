name: Android CI

on:
  push:
    branches: [ "main", "master", "hlavní" ]
  pull_request:
    branches: [ "main", "master", "hlavní" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x ./aplikace/gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug
      working-directory: ./aplikace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: aplikace/build/outputs/apk/debug/*.apk
